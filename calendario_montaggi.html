<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calendario Montaggi</title>
<style>
:root{--blu:#003366;--bg:#f4f6f8;--card:#fff;--border:#d9dee5;--txt:#1f2937;--muted:#6b7280;--green:#16a34a;--yellow:#f59e0b;--blue:#2563eb;--red:#dc2626;--grey:#6b7280}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--txt)}
header{background:var(--blu);color:white;padding:18px 24px;display:flex;gap:16px;align-items:center;justify-content:space-between;flex-wrap:wrap}
header h1{margin:0;font-size:24px}.top-actions{display:flex;gap:8px;flex-wrap:wrap}
button,.btn{border:0;border-radius:8px;padding:10px 14px;font-weight:700;cursor:pointer;background:#e5e7eb;color:#111;text-decoration:none;display:inline-block}button.primary{background:#0ea5e9;color:white}button.danger{background:#fee2e2;color:#991b1b}.wrap{padding:18px;max-width:1500px;margin:0 auto}.toolbar,.panel,.calendar{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:14px;margin-bottom:14px}.toolbar{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:10px;align-items:end}.field label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px;font-size:14px;background:white}.field textarea{min-height:70px}.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.full{grid-column:1/-1}.half{grid-column:span 2}.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:13px;align-items:center}.dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:5px}.dafare{background:var(--grey)}.incorso{background:var(--yellow)}.completato{background:var(--green)}.bloccato{background:var(--red)}.monthbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.monthbar h2{margin:0;color:var(--blu)}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.dayname{font-weight:700;text-align:center;color:var(--muted);padding:8px}.day{background:#fff;border:1px solid var(--border);border-radius:10px;min-height:135px;padding:8px;overflow:hidden}.day.other{background:#f3f4f6;color:#9ca3af}.day.today{outline:3px solid #93c5fd}.num{font-weight:700;margin-bottom:6px}.event{font-size:12px;border-left:5px solid var(--grey);background:#f9fafb;border-radius:6px;padding:6px;margin:5px 0;cursor:pointer;line-height:1.25}.event strong{display:block}.event.incorso{border-left-color:var(--yellow)}.event.completato{border-left-color:var(--green)}.event.bloccato{border-left-color:var(--red)}.event.dafare{border-left-color:var(--grey)}.list{display:grid;gap:8px}.row{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr auto;gap:8px;align-items:center}.tag{font-size:12px;border-radius:999px;padding:4px 8px;font-weight:700;display:inline-block}.tag.dafare{background:#e5e7eb}.tag.incorso{background:#fef3c7}.tag.completato{background:#dcfce7}.tag.bloccato{background:#fee2e2}.small{font-size:12px;color:var(--muted)}.links a{margin-right:8px;color:#0b5cab;font-weight:700}.hidden{display:none!important}.sync{font-size:12px;color:#dbeafe}
@media(max-width:1000px){.toolbar{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.half{grid-column:1}.grid{gap:4px}.day{min-height:110px;padding:5px}.row{grid-template-columns:1fr}.event{font-size:11px}}
@media print{header,.toolbar,.panel button,.top-actions{display:none}.wrap{padding:0}.calendar,.panel{box-shadow:none;border:0}.day{break-inside:avoid}}
</style>
</head>
<body>
<header>
  <div><h1>🔧 Calendario Montaggi</h1><div class="sync" id="syncStatus">Connessione Firebase...</div></div>
  <div class="top-actions">
    <button class="primary" onclick="nuovoMontaggio()">+ Nuovo montaggio</button>
    <button onclick="window.print()">Stampa</button>
    <button onclick="esportaJSON()">Esporta backup</button>
  </div>
</header>
<div class="wrap">
  <div class="toolbar">
    <div class="field"><label>Cerca cliente / commessa / città</label><input id="cerca" oninput="render()" placeholder="Es. Rossi, OVI, Bologna"></div>
    <div class="field"><label>Stato</label><select id="filtroStato" onchange="render()"><option value="">Tutti</option><option>Da fare</option><option>In corso</option><option>Completato</option><option>Bloccato</option></select></div>
    <div class="field"><label>Squadra</label><input id="filtroSquadra" oninput="render()" placeholder="Es. Marco"></div>
    <div class="field"><label>Mese</label><input id="mesePicker" type="month" onchange="vaiMese(this.value)"></div>
    <div class="field"><label>Vista</label><select id="vista" onchange="render()"><option value="cal">Calendario</option><option value="lista">Lista</option></select></div>
    <div class="legend"><span><i class="dot dafare"></i>Da fare</span><span><i class="dot incorso"></i>In corso</span><span><i class="dot completato"></i>Completato</span><span><i class="dot bloccato"></i>Bloccato</span></div>
  </div>

  <div id="formPanel" class="panel hidden">
    <h2 id="formTitle">Nuovo montaggio</h2>
    <div class="form-grid">
      <div class="field"><label>Cliente *</label><input id="cliente"></div>
      <div class="field"><label>Commessa / Ordine</label><input id="commessa" placeholder="es. OVI26-..."></div>
      <div class="field"><label>Data montaggio *</label><input id="data" type="date"></div>
      <div class="field"><label>Ora</label><input id="ora" type="time"></div>
      <div class="field half"><label>Indirizzo cantiere</label><input id="indirizzo"></div>
      <div class="field"><label>Città</label><input id="citta"></div>
      <div class="field"><label>Provincia</label><input id="prov"></div>
      <div class="field"><label>Referente cliente</label><input id="referente"></div>
      <div class="field"><label>Telefono</label><input id="telefono"></div>
      <div class="field"><label>Squadra</label><input id="squadra" placeholder="es. Mario + Luca"></div>
      <div class="field"><label>Mezzo</label><input id="mezzo" placeholder="es. Furgone / 7,5 m"></div>
      <div class="field"><label>Stato</label><select id="stato"><option>Da fare</option><option>In corso</option><option>Completato</option><option>Bloccato</option></select></div>
      <div class="field half"><label>Link allegato sicurezza</label><input id="sicurezza" placeholder="https://... PDF sicurezza"></div>
      <div class="field half"><label>Link istruzioni montaggio</label><input id="istruzioni" placeholder="https://... PDF istruzioni / disegni"></div>
      <div class="field full"><label>Note</label><textarea id="note" placeholder="Materiale da portare, criticità, DPI, accessi, orari..."></textarea></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="primary" onclick="salvaMontaggio()">Salva</button>
      <button onclick="chiudiForm()">Annulla</button>
      <button id="deleteBtn" class="danger hidden" onclick="eliminaMontaggio()">Elimina</button>
    </div>
  </div>

  <div id="calendarPanel" class="calendar">
    <div class="monthbar"><button onclick="cambiaMese(-1)">◀ Mese precedente</button><h2 id="titoloMese"></h2><button onclick="cambiaMese(1)">Mese successivo ▶</button></div>
    <div class="grid" id="calGrid"></div>
  </div>
  <div id="listPanel" class="panel hidden"><h2>Elenco montaggi</h2><div id="lista" class="list"></div></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNgpYA2d7HToJppcZ6yLDLSt3A75c9Ogk",
  authDomain: "calendario-spedizioni.firebaseapp.com",
  projectId: "calendario-spedizioni",
  storageBucket: "calendario-spedizioni.firebasestorage.app",
  messagingSenderId: "214380369240",
  appId: "1:214380369240:web:85551d1aa272d9f736412d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const col = collection(db, "montaggi");

let montaggi=[];
let editId=null; let corrente=new Date(); corrente.setDate(1);
const campi=['cliente','commessa','data','ora','indirizzo','citta','prov','referente','telefono','squadra','mezzo','stato','sicurezza','istruzioni','note'];

window.nuovoMontaggio=nuovoMontaggio;
window.apriMontaggio=apriMontaggio;
window.chiudiForm=chiudiForm;
window.salvaMontaggio=salvaMontaggio;
window.eliminaMontaggio=eliminaMontaggio;
window.cambiaMese=cambiaMese;
window.vaiMese=vaiMese;
window.render=render;
window.esportaJSON=esportaJSON;

onSnapshot(query(col), (snapshot)=>{
  montaggi=snapshot.docs.map(d=>({id:d.id,...d.data()}));
  syncStatus.textContent='Dati condivisi Firebase aggiornati: '+new Date().toLocaleTimeString('it-IT');
  render();
}, (err)=>{
  console.error(err);
  syncStatus.textContent='Errore collegamento Firebase. Controlla permessi Firestore.';
  alert('Errore Firebase: '+err.message);
});

function statoClass(s){return (s||'Da fare').toLowerCase().replaceAll(' ','').replace('dafare','dafare')}
function nuovoMontaggio(){editId=null; campi.forEach(id=>document.getElementById(id).value=''); document.getElementById('stato').value='Da fare'; document.getElementById('data').value=new Date().toISOString().slice(0,10); document.getElementById('formTitle').textContent='Nuovo montaggio'; document.getElementById('deleteBtn').classList.add('hidden'); document.getElementById('formPanel').classList.remove('hidden'); window.scrollTo({top:0,behavior:'smooth'});}
function apriMontaggio(id){const m=montaggi.find(x=>x.id===id); if(!m)return; editId=id; campi.forEach(k=>document.getElementById(k).value=m[k]||''); document.getElementById('formTitle').textContent='Modifica montaggio'; document.getElementById('deleteBtn').classList.remove('hidden'); document.getElementById('formPanel').classList.remove('hidden'); window.scrollTo({top:0,behavior:'smooth'});}
function chiudiForm(){document.getElementById('formPanel').classList.add('hidden'); editId=null;}
async function salvaMontaggio(){let m={}; campi.forEach(k=>m[k]=document.getElementById(k).value.trim()); if(!m.cliente||!m.data){alert('Cliente e data montaggio sono obbligatori.');return;} m.updatedAt=new Date().toISOString(); try{ if(editId){await updateDoc(doc(db,'montaggi',editId),m);}else{await addDoc(col,{...m,createdAt:new Date().toISOString()});} chiudiForm(); }catch(e){alert('Errore salvataggio Firebase: '+e.message);} }
async function eliminaMontaggio(){if(!editId)return; if(confirm('Eliminare questo montaggio?')){try{await deleteDoc(doc(db,'montaggi',editId)); chiudiForm();}catch(e){alert('Errore eliminazione Firebase: '+e.message);}}}
function filtra(){const q=document.getElementById('cerca').value.toLowerCase(); const fs=document.getElementById('filtroStato').value; const sq=document.getElementById('filtroSquadra').value.toLowerCase(); return montaggi.filter(m=>{const testo=[m.cliente,m.commessa,m.citta,m.indirizzo,m.referente,m.note].join(' ').toLowerCase(); return (!q||testo.includes(q)) && (!fs||m.stato===fs) && (!sq||(m.squadra||'').toLowerCase().includes(sq));});}
function render(){document.getElementById('mesePicker').value=corrente.toISOString().slice(0,7); const vista=document.getElementById('vista').value; document.getElementById('calendarPanel').classList.toggle('hidden',vista!=='cal'); document.getElementById('listPanel').classList.toggle('hidden',vista!=='lista'); renderCalendario(); renderLista();}
function renderCalendario(){const mesi=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre']; document.getElementById('titoloMese').textContent=mesi[corrente.getMonth()]+' '+corrente.getFullYear(); const grid=document.getElementById('calGrid'); grid.innerHTML=''; ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].forEach(d=>grid.innerHTML+=`<div class="dayname">${d}</div>`); let first=new Date(corrente); let start=new Date(first); let day=(first.getDay()+6)%7; start.setDate(first.getDate()-day); const dati=filtra(); const today=new Date().toISOString().slice(0,10); for(let i=0;i<42;i++){let d=new Date(start); d.setDate(start.getDate()+i); let iso=d.toISOString().slice(0,10); let cls='day'; if(d.getMonth()!==corrente.getMonth())cls+=' other'; if(iso===today)cls+=' today'; let html=`<div class="${cls}"><div class="num">${d.getDate()}</div>`; dati.filter(m=>m.data===iso).sort((a,b)=>(a.ora||'').localeCompare(b.ora||'')).forEach(m=>{let sc=statoClass(m.stato); html+=`<div class="event ${sc}" onclick="apriMontaggio('${m.id}')"><strong>${m.ora?m.ora+' - ':''}${escapeHtml(m.cliente)}</strong><span>${escapeHtml(m.citta||'')}</span><br><span class="small">${escapeHtml(m.squadra||'')}</span></div>`;}); html+='</div>'; grid.innerHTML+=html;}}
function renderLista(){const el=document.getElementById('lista'); const dati=filtra().sort((a,b)=>((a.data||'')+(a.ora||'')).localeCompare((b.data||'')+(b.ora||''))); if(!dati.length){el.innerHTML='<p class="small">Nessun montaggio trovato.</p>';return;} el.innerHTML=dati.map(m=>{let sc=statoClass(m.stato); let links=''; if(m.sicurezza) links+=`<a href="${m.sicurezza}" target="_blank">Sicurezza</a>`; if(m.istruzioni) links+=`<a href="${m.istruzioni}" target="_blank">Istruzioni</a>`; return `<div class="row"><div><strong>${escapeHtml(m.cliente)}</strong><div class="small">${escapeHtml(m.commessa||'')}</div></div><div>${formatData(m.data)} ${m.ora||''}</div><div>${escapeHtml([m.citta,m.prov].filter(Boolean).join(' '))}<div class="small">${escapeHtml(m.indirizzo||'')}</div></div><div>${escapeHtml(m.squadra||'')}<div class="links">${links}</div></div><div><span class="tag ${sc}">${m.stato||'Da fare'}</span><br><button onclick="apriMontaggio('${m.id}')" style="margin-top:6px">Apri</button></div></div>`}).join('');}
function cambiaMese(n){corrente.setMonth(corrente.getMonth()+n); render();}
function vaiMese(v){if(!v)return; corrente=new Date(v+'-01'); render();}
function formatData(s){if(!s)return''; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`;}
function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function esportaJSON(){const blob=new Blob([JSON.stringify(montaggi,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup_calendario_montaggi_firebase.json'; a.click(); URL.revokeObjectURL(a.href);}
render();
</script>
</body>
</html>
